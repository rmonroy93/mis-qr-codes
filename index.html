<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Generator — rmonroy93</title>
  <!-- APP_VERSION: 1.1.0 -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="./qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2a2a30;
      --accent: #c8f135;
      --accent-dim: #a0c020;
      --text: #f0f0ee;
      --muted: #888890;
      --danger: #ff5c5c;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .wrap { width: 100%; max-width: 460px; }
    .header { margin-bottom: 2rem; }
    .header h1 {
      font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 500;
      color: var(--accent); letter-spacing: -0.5px;
    }
    .header-row { display: flex; align-items: baseline; justify-content: space-between; }
    .version-tag {
      font-size: 10px; font-family: 'DM Mono', monospace;
      color: var(--muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 8px;
    }
    .header p { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem; margin-bottom: 1rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .card-title {
      font-size: 12px; font-family: 'DM Mono', monospace;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 1.25rem;
    }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px;
      font-family: 'DM Mono', monospace;
      padding: 10px 14px; margin-bottom: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #444; }
    .btn {
      width: 100%; padding: 12px; border-radius: 8px;
      font-size: 14px; font-family: 'DM Mono', monospace;
      font-weight: 500; cursor: pointer;
      transition: all 0.15s; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
    }
    .btn:hover { background: var(--surface2); color: var(--text); }
    .btn-primary { background: var(--accent); color: #0e0e0f; border-color: var(--accent); margin-bottom: 8px; }
    .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .token-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 1rem; }
    .token-row input { margin-bottom: 0; flex: 1; }
    .token-row .btn { width: auto; padding: 10px 16px; white-space: nowrap; margin-bottom: 0; }
    .badge {
      display: inline-block; font-size: 10px;
      font-family: 'DM Mono', monospace;
      padding: 2px 8px; border-radius: 4px;
      background: #1a2e00; color: var(--accent);
      border: 1px solid #3a5a00; margin-left: 8px; vertical-align: middle;
    }
    .status {
      font-size: 13px; font-family: 'DM Mono', monospace;
      padding: 10px 14px; border-radius: 8px;
      margin-top: 12px; display: none; line-height: 1.6; white-space: pre-line;
    }
    .status.loading { background: #0d1f33; color: #60a0e0; border: 1px solid #1a3a5a; display: block; }
    .status.error   { background: #2a0000; color: var(--danger); border: 1px solid #500; display: block; }
    .status.success { background: #1a2e00; color: var(--accent); border: 1px solid #3a5a00; display: block; }
    .qr-box { text-align: center; margin-top: 1.25rem; display: none; }
    .qr-box canvas { border-radius: 8px; border: 1px solid var(--border); padding: 10px; background: #fff; }
    .qr-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 8px; word-break: break-all; }
    .gh-link {
      display: block; text-align: center;
      font-size: 13px; font-family: 'DM Mono', monospace;
      color: var(--accent); text-decoration: none;
      margin-top: 12px; padding: 10px;
      border: 1px solid #3a5a00; border-radius: 8px;
      background: #1a2e00; transition: background 0.15s;
    }
    .gh-link:hover { background: #253f00; }
    .change-token {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--muted); text-decoration: underline;
      cursor: pointer; background: none; border: none;
      padding: 0; display: block; margin-top: 12px; margin-left: auto;
    }
    .change-token:hover { color: var(--text); }
    .info-box {
      font-size: 12px; font-family: 'DM Mono', monospace;
      color: var(--muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; margin-bottom: 1.25rem; line-height: 1.7;
    }
    .info-box span { color: var(--text); }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #1a3a5a; border-top-color: #60a0e0;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #qr-hidden-wrap { position: fixed; left: -9999px; top: -9999px; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-row">
      <h1>QR_GENERATOR</h1>
      <span class="version-tag">v1.1.0</span>
    </div>
    <p>rmonroy93 / mis-qr-codes &nbsp;·&nbsp; <a href="./gallery.html" style="color:var(--accent);text-decoration:none;font-size:12px;">ver galería →</a></p>
  </div>

  <!-- Panel Token -->
  <div class="card" id="panel-token">
    <div class="card-title">configuración <span id="token-badge" class="badge" style="display:none;">token guardado</span></div>
    <div class="info-box">
      Repositorio: <span>rmonroy93/mis-qr-codes</span><br>
      Carpeta: <span>qr-codes/</span><br><br>
      Ingresa tu token una vez. Se guarda en tu navegador.
    </div>
    <label>GitHub Token (classic)</label>
    <div class="token-row">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button class="btn btn-primary" style="margin-bottom:0;" id="btn-guardar" onclick="saveToken()">Guardar</button>
    </div>
    <div class="status" id="token-status"></div>
    <button class="btn btn-primary" id="btn-continuar" onclick="goToMain()" style="display:none;">Continuar →</button>
  </div>

  <!-- Panel Principal -->
  <div class="card" id="panel-main" style="display:none;">
    <div class="card-title">nueva url → qr</div>
    <label>URL</label>
    <input type="url" id="url-input" placeholder="https://ejemplo.com" />
    <label>Nombre del archivo (sin extensión)</label>
    <input type="text" id="file-name" placeholder="mi-qr" value="qr" />
    <button class="btn btn-primary" id="btn-generar" onclick="generateAndSave()">Generar y subir a GitHub</button>
    <button class="btn" onclick="previewOnly()">Solo previsualizar</button>
    <div class="qr-box" id="qr-preview-box">
      <canvas id="qr-canvas-preview"></canvas>
      <div class="qr-label" id="qr-preview-label"></div>
    </div>
    <div class="status" id="status-msg"></div>
    <button class="change-token" onclick="changeToken()">cambiar token</button>
  </div>

  <!-- Panel Éxito -->
  <div class="card" id="panel-success" style="display:none;">
    <div class="card-title">subido correctamente</div>
    <div class="qr-box" style="display:block;">
      <canvas id="qr-canvas-final"></canvas>
      <div class="qr-label" id="qr-path-label"></div>
    </div>
    <a id="github-link" href="#" class="gh-link" target="_blank">ver en github →</a>
    <button class="btn btn-primary" style="margin-top:12px;" onclick="newQR()">Generar otro QR</button>
  </div>
</div>

<div id="qr-hidden-wrap"><canvas id="qr-hidden"></canvas></div>

<script>
  const OWNER     = 'rmonroy93';
  const REPO      = 'mis-qr-codes';
  const FOLDER    = 'qr-codes';
  const TOKEN_KEY = 'gh_token_rmonroy93';

  function init() {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved) {
      document.getElementById('gh-token').value = saved;
      document.getElementById('token-badge').style.display = 'inline-block';
      document.getElementById('btn-continuar').style.display = 'block';
    }
  }

  function setTokenStatus(type, msg) {
    const el = document.getElementById('token-status');
    el.className = 'status ' + type;
    el.innerHTML = type === 'loading'
      ? `<span class="spinner"></span>${msg}`
      : msg;
  }

  async function saveToken() {
    const t = document.getElementById('gh-token').value.trim();
    if (!t) { setTokenStatus('error', 'Ingresa tu token primero.'); return; }

    const btn = document.getElementById('btn-guardar');
    btn.disabled = true;
    setTokenStatus('loading', 'Validando token...');

    try {
      const res = await fetch('https://api.github.com/user', {
        headers: {
          'Authorization': `Bearer ${t}`,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      const user = await res.json();
      localStorage.setItem(TOKEN_KEY, t);
      document.getElementById('token-badge').style.display = 'inline-block';
      document.getElementById('btn-continuar').style.display = 'block';
      setTokenStatus('success', `✓ Token válido — conectado como @${user.login}`);
    } catch(e) {
      setTokenStatus('error', `Token inválido: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }

  function goToMain() {
    const t = localStorage.getItem(TOKEN_KEY) || document.getElementById('gh-token').value.trim();
    if (!t) { alert('Guarda tu token primero.'); return; }
    document.getElementById('panel-token').style.display = 'none';
    document.getElementById('panel-main').style.display = 'block';
  }

  function changeToken() {
    localStorage.removeItem(TOKEN_KEY);
    document.getElementById('panel-main').style.display = 'none';
    document.getElementById('panel-token').style.display = 'block';
    document.getElementById('gh-token').value = '';
    document.getElementById('token-badge').style.display = 'none';
    document.getElementById('btn-continuar').style.display = 'none';
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status-msg');
    el.className = 'status ' + type;
    el.innerHTML = type === 'loading'
      ? `<span class="spinner"></span>${msg}`
      : msg;
  }

  function makeQR(url, canvas, size) {
    return new Promise((resolve, reject) => {
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);
      QRCode.toCanvas(canvas, url, {
        width: size, margin: 2,
        color: { dark: '#000000', light: '#ffffff' }
      }, (err) => { if (err) reject(err); else resolve(); });
    });
  }

  function previewOnly() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { alert('Ingresa una URL primero.'); return; }
    makeQR(url, document.getElementById('qr-canvas-preview'), 220)
      .then(() => {
        document.getElementById('qr-preview-label').textContent = url;
        document.getElementById('qr-preview-box').style.display = 'block';
      })
      .catch(e => setStatus('error', 'Error al generar QR: ' + e.message));
  }

  async function generateAndSave() {
    const url      = document.getElementById('url-input').value.trim();
    const fileName = document.getElementById('file-name').value.trim() || 'qr';
    const token    = localStorage.getItem(TOKEN_KEY) || document.getElementById('gh-token').value.trim();

    if (!url)   { alert('Ingresa una URL primero.'); return; }
    if (!token) { alert('No hay token guardado.'); return; }

    const btn = document.getElementById('btn-generar');
    btn.disabled = true;
    setStatus('loading', 'Generando QR...');

    try {
      await makeQR(url, document.getElementById('qr-hidden'), 400);
      const base64 = document.getElementById('qr-hidden').toDataURL('image/png').split(',')[1];

      setStatus('loading', 'Subiendo a GitHub...');

      const filePath = `${FOLDER}/${fileName}.png`;
      const apiUrl   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`;
      const headers  = {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      };

      let sha;
      try {
        const check = await fetch(apiUrl, { headers });
        if (check.ok) sha = (await check.json()).sha;
      } catch(_) {}

      const body = { message: `chore: QR para ${url}`, content: base64, ...(sha && { sha }) };
      const resp = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.message || `HTTP ${resp.status}`);
      }

      const data   = await resp.json();
      const ghLink = data.content?.html_url || `https://github.com/${OWNER}/${REPO}/blob/main/${filePath}`;

      await makeQR(url, document.getElementById('qr-canvas-final'), 220);
      document.getElementById('qr-path-label').textContent = filePath;
      document.getElementById('github-link').href = ghLink;
      document.getElementById('panel-main').style.display = 'none';
      document.getElementById('panel-success').style.display = 'block';

    } catch(e) {
      let msg = e.message;
      if (msg.toLowerCase().includes('failed to fetch')) {
        msg = '⚠ No se pudo conectar con GitHub.\n\nEsto ocurre cuando el archivo se abre directo desde la computadora (file://).\n\nSolución rápida en VS Code:\n1. Instala la extensión "Live Server"\n2. Click derecho en este archivo → "Open with Live Server"\n3. Se abrirá en http://localhost:5500';
      }
      setStatus('error', msg);
    } finally {
      btn.disabled = false;
    }
  }

  function newQR() {
    document.getElementById('panel-success').style.display = 'none';
    document.getElementById('panel-main').style.display = 'block';
    document.getElementById('url-input').value = '';
    document.getElementById('file-name').value = 'qr';
    document.getElementById('qr-preview-box').style.display = 'none';
    document.getElementById('status-msg').className = 'status';
  }

  init();
</script>
</body>
</html>
