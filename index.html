<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Generator — rmonroy93</title>
  <!-- APP_VERSION: 1.2.0 -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="./qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2a2a30;
      --accent: #c8f135;
      --accent-dim: #a0c020;
      --text: #f0f0ee;
      --muted: #888890;
      --danger: #ff5c5c;
      --warning: #f0a030;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .wrap { width: 100%; max-width: 500px; }
    .header { margin-bottom: 2rem; }
    .header h1 {
      font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 500;
      color: var(--accent); letter-spacing: -0.5px;
    }
    .header-row { display: flex; align-items: baseline; justify-content: space-between; }
    .version-tag {
      font-size: 10px; font-family: 'DM Mono', monospace;
      color: var(--muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 8px;
    }
    .header p { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem; margin-bottom: 1rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .card-title {
      font-size: 12px; font-family: 'DM Mono', monospace;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 1.25rem;
    }
    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 1.25rem;
      background: var(--surface2); border-radius: 8px; padding: 4px;
    }
    .tab {
      flex: 1; padding: 8px; border-radius: 6px;
      font-size: 12px; font-family: 'DM Mono', monospace;
      cursor: pointer; border: none; background: transparent;
      color: var(--muted); transition: all 0.15s; text-align: center;
    }
    .tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .tab:hover:not(.active) { color: var(--text); }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px;
      font-family: 'DM Mono', monospace;
      padding: 10px 14px; margin-bottom: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    textarea {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px;
      font-family: 'DM Mono', monospace;
      padding: 10px 14px; margin-bottom: 1rem;
      outline: none; transition: border-color 0.2s;
      resize: vertical; min-height: 140px; line-height: 1.7;
    }
    textarea:focus, input:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: #444; }
    .btn {
      width: 100%; padding: 12px; border-radius: 8px;
      font-size: 14px; font-family: 'DM Mono', monospace;
      font-weight: 500; cursor: pointer;
      transition: all 0.15s; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
    }
    .btn:hover { background: var(--surface2); color: var(--text); }
    .btn-primary { background: var(--accent); color: #0e0e0f; border-color: var(--accent); margin-bottom: 8px; }
    .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .token-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 1rem; }
    .token-row input { margin-bottom: 0; flex: 1; }
    .token-row .btn { width: auto; padding: 10px 16px; white-space: nowrap; margin-bottom: 0; }
    .badge {
      display: inline-block; font-size: 10px;
      font-family: 'DM Mono', monospace;
      padding: 2px 8px; border-radius: 4px;
      background: #1a2e00; color: var(--accent);
      border: 1px solid #3a5a00; margin-left: 8px; vertical-align: middle;
    }
    .status {
      font-size: 13px; font-family: 'DM Mono', monospace;
      padding: 10px 14px; border-radius: 8px;
      margin-top: 12px; display: none; line-height: 1.6; white-space: pre-line;
    }
    .status.loading { background: #0d1f33; color: #60a0e0; border: 1px solid #1a3a5a; display: block; }
    .status.error   { background: #2a0000; color: var(--danger); border: 1px solid #500; display: block; }
    .status.success { background: #1a2e00; color: var(--accent); border: 1px solid #3a5a00; display: block; }
    .qr-box { text-align: center; margin-top: 1.25rem; display: none; }
    .qr-box canvas { border-radius: 8px; border: 1px solid var(--border); padding: 10px; background: #fff; }
    .qr-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 8px; word-break: break-all; }
    .gh-link {
      display: block; text-align: center;
      font-size: 13px; font-family: 'DM Mono', monospace;
      color: var(--accent); text-decoration: none;
      margin-top: 12px; padding: 10px;
      border: 1px solid #3a5a00; border-radius: 8px;
      background: #1a2e00; transition: background 0.15s;
    }
    .gh-link:hover { background: #253f00; }
    .change-token {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--muted); text-decoration: underline;
      cursor: pointer; background: none; border: none;
      padding: 0; display: block; margin-top: 12px; margin-left: auto;
    }
    .change-token:hover { color: var(--text); }
    .info-box {
      font-size: 12px; font-family: 'DM Mono', monospace;
      color: var(--muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; margin-bottom: 1.25rem; line-height: 1.7;
    }
    .info-box span { color: var(--text); }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #1a3a5a; border-top-color: #60a0e0;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #qr-hidden-wrap { position: fixed; left: -9999px; top: -9999px; }

    /* Batch */
    .preview-list {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 1rem; overflow: hidden;
    }
    .preview-list-header {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--muted); padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }
    .preview-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 12px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-family: 'DM Mono', monospace;
    }
    .preview-item:last-child { border-bottom: none; }
    .preview-item .folio { color: var(--accent); min-width: 130px; }
    .preview-item .purl  { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-item .item-status { margin-left: auto; font-size: 11px; flex-shrink: 0; }
    .item-status.pending  { color: #555; }
    .item-status.running  { color: #60a0e0; }
    .item-status.done     { color: var(--accent); }
    .item-status.failed   { color: var(--danger); }

    .progress-bar-wrap {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; margin-bottom: 1rem; display: none;
    }
    .progress-bar {
      height: 4px; background: var(--accent);
      transition: width 0.3s ease; width: 0%;
    }
    .progress-label {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--muted); padding: 6px 12px; display: flex; justify-content: space-between;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-row">
      <h1>QR_GENERATOR</h1>
      <span class="version-tag">v1.2.0</span>
    </div>
    <p>rmonroy93 / mis-qr-codes &nbsp;·&nbsp; <a href="./gallery.html" style="color:var(--accent);text-decoration:none;font-size:12px;">ver galería →</a></p>
  </div>

  <!-- Panel Token -->
  <div class="card" id="panel-token">
    <div class="card-title">configuración <span id="token-badge" class="badge" style="display:none;">token guardado</span></div>
    <div class="info-box">
      Repositorio: <span>rmonroy93/mis-qr-codes</span><br>
      Carpeta: <span>qr-codes/</span><br><br>
      Ingresa tu token una vez. Se guarda en tu navegador.
    </div>
    <label>GitHub Token (classic)</label>
    <div class="token-row">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button class="btn btn-primary" style="margin-bottom:0;" id="btn-guardar" onclick="saveToken()">Guardar</button>
    </div>
    <div class="status" id="token-status"></div>
    <button class="btn btn-primary" id="btn-continuar" onclick="goToMain()" style="display:none;">Continuar →</button>
  </div>

  <!-- Panel Principal -->
  <div class="card" id="panel-main" style="display:none;">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-single" onclick="switchTab('single')">URL individual</button>
      <button class="tab" id="tab-batch" onclick="switchTab('batch')">Carga masiva</button>
    </div>

    <!-- Tab: individual -->
    <div id="tab-content-single">
      <label>URL</label>
      <input type="url" id="url-input" placeholder="https://ejemplo.com" />
      <label>Nombre del archivo (sin extensión)</label>
      <input type="text" id="file-name" placeholder="mi-qr" value="qr" />
      <button class="btn btn-primary" id="btn-generar" onclick="generateAndSave()">Generar y subir a GitHub</button>
      <button class="btn" onclick="previewOnly()">Solo previsualizar</button>
      <div class="qr-box" id="qr-preview-box">
        <canvas id="qr-canvas-preview"></canvas>
        <div class="qr-label" id="qr-preview-label"></div>
      </div>
      <div class="status" id="status-msg"></div>
    </div>

    <!-- Tab: masiva -->
    <div id="tab-content-batch" style="display:none;">
      <label>Pega tus ligas (una por línea)</label>
      <textarea id="batch-input" placeholder="https://siged.dgairgob.mx/770510338253&#10;https://siged.dgairgob.mx/227642564155&#10;https://siged.dgairgob.mx/317247673906"></textarea>

      <button class="btn btn-primary" id="btn-parse" onclick="parseBatch()">Analizar ligas</button>

      <div id="batch-preview" style="display:none;">
        <div class="preview-list" id="preview-list"></div>

        <div class="progress-bar-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
          <div class="progress-label">
            <span id="progress-text">0 / 0</span>
            <span id="progress-pct">0%</span>
          </div>
        </div>

        <button class="btn btn-primary" id="btn-batch-run" onclick="runBatch()">Generar y subir todos</button>
        <button class="btn" id="btn-batch-cancel" onclick="cancelBatch()" style="display:none;">Cancelar</button>
        <div class="status" id="batch-status"></div>
      </div>
    </div>

    <button class="change-token" onclick="changeToken()">cambiar token</button>
  </div>

  <!-- Panel Éxito (individual) -->
  <div class="card" id="panel-success" style="display:none;">
    <div class="card-title">subido correctamente</div>
    <div class="qr-box" style="display:block;">
      <canvas id="qr-canvas-final"></canvas>
      <div class="qr-label" id="qr-path-label"></div>
    </div>
    <a id="github-link" href="#" class="gh-link" target="_blank">ver en github →</a>
    <button class="btn btn-primary" style="margin-top:12px;" onclick="newQR()">Generar otro QR</button>
  </div>
</div>

<div id="qr-hidden-wrap"><canvas id="qr-hidden"></canvas></div>

<script>
  const OWNER     = 'rmonroy93';
  const REPO      = 'mis-qr-codes';
  const FOLDER    = 'qr-codes';
  const TOKEN_KEY = 'gh_token_rmonroy93';

  let batchItems = [];
  let batchRunning = false;
  let batchCancelled = false;

  // ── Init ──────────────────────────────────────────────
  function init() {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved) {
      document.getElementById('gh-token').value = saved;
      document.getElementById('token-badge').style.display = 'inline-block';
      document.getElementById('btn-continuar').style.display = 'block';
    }
  }

  // ── Token ─────────────────────────────────────────────
  function setTokenStatus(type, msg) {
    const el = document.getElementById('token-status');
    el.className = 'status ' + type;
    el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
  }

  async function saveToken() {
    const t = document.getElementById('gh-token').value.trim();
    if (!t) { setTokenStatus('error', 'Ingresa tu token primero.'); return; }
    const btn = document.getElementById('btn-guardar');
    btn.disabled = true;
    setTokenStatus('loading', 'Validando token...');
    try {
      const res = await fetch('https://api.github.com/user', {
        headers: {
          'Authorization': `Bearer ${t}`,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `HTTP ${res.status}`); }
      const user = await res.json();
      localStorage.setItem(TOKEN_KEY, t);
      document.getElementById('token-badge').style.display = 'inline-block';
      document.getElementById('btn-continuar').style.display = 'block';
      setTokenStatus('success', `✓ Token válido — conectado como @${user.login}`);
    } catch(e) {
      setTokenStatus('error', `Token inválido: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }

  function goToMain() {
    const t = localStorage.getItem(TOKEN_KEY) || document.getElementById('gh-token').value.trim();
    if (!t) { alert('Guarda tu token primero.'); return; }
    document.getElementById('panel-token').style.display = 'none';
    document.getElementById('panel-main').style.display = 'block';
  }

  function changeToken() {
    localStorage.removeItem(TOKEN_KEY);
    document.getElementById('panel-main').style.display = 'none';
    document.getElementById('panel-token').style.display = 'block';
    document.getElementById('gh-token').value = '';
    document.getElementById('token-badge').style.display = 'none';
    document.getElementById('btn-continuar').style.display = 'none';
  }

  // ── Tabs ──────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-single').classList.toggle('active', tab === 'single');
    document.getElementById('tab-batch').classList.toggle('active', tab === 'batch');
    document.getElementById('tab-content-single').style.display = tab === 'single' ? 'block' : 'none';
    document.getElementById('tab-content-batch').style.display  = tab === 'batch'  ? 'block' : 'none';
  }

  // ── QR core ───────────────────────────────────────────
  function setStatus(type, msg) {
    const el = document.getElementById('status-msg');
    el.className = 'status ' + type;
    el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
  }

  function makeQR(url, canvas, size) {
    return new Promise((resolve, reject) => {
      canvas.width = size; canvas.height = size;
      canvas.getContext('2d').clearRect(0, 0, size, size);
      QRCode.toCanvas(canvas, url, {
        width: size, margin: 2,
        color: { dark: '#000000', light: '#ffffff' }
      }, err => err ? reject(err) : resolve());
    });
  }

  async function uploadQR(url, fileName, token) {
    await makeQR(url, document.getElementById('qr-hidden'), 400);
    const base64  = document.getElementById('qr-hidden').toDataURL('image/png').split(',')[1];
    const filePath = `${FOLDER}/${fileName}.png`;
    const apiUrl   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`;
    const headers  = {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    };
    let sha;
    try { const c = await fetch(apiUrl, { headers }); if (c.ok) sha = (await c.json()).sha; } catch(_) {}
    const resp = await fetch(apiUrl, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: `chore: QR folio ${fileName}`, content: base64, ...(sha && { sha }) })
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.message || `HTTP ${resp.status}`); }
    return (await resp.json()).content?.html_url || `https://github.com/${OWNER}/${REPO}/blob/main/${filePath}`;
  }

  // ── Individual ────────────────────────────────────────
  function previewOnly() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { alert('Ingresa una URL primero.'); return; }
    makeQR(url, document.getElementById('qr-canvas-preview'), 220)
      .then(() => {
        document.getElementById('qr-preview-label').textContent = url;
        document.getElementById('qr-preview-box').style.display = 'block';
      })
      .catch(e => setStatus('error', 'Error al generar QR: ' + e.message));
  }

  async function generateAndSave() {
    const url      = document.getElementById('url-input').value.trim();
    const fileName = document.getElementById('file-name').value.trim() || 'qr';
    const token    = localStorage.getItem(TOKEN_KEY);
    if (!url)   { alert('Ingresa una URL primero.'); return; }
    if (!token) { alert('No hay token guardado.'); return; }
    const btn = document.getElementById('btn-generar');
    btn.disabled = true;
    setStatus('loading', 'Generando QR...');
    try {
      setStatus('loading', 'Subiendo a GitHub...');
      const ghLink = await uploadQR(url, fileName, token);
      await makeQR(url, document.getElementById('qr-canvas-final'), 220);
      document.getElementById('qr-path-label').textContent = `${FOLDER}/${fileName}.png`;
      document.getElementById('github-link').href = ghLink;
      document.getElementById('panel-main').style.display = 'none';
      document.getElementById('panel-success').style.display = 'block';
    } catch(e) {
      setStatus('error', e.message);
    } finally {
      btn.disabled = false;
    }
  }

  function newQR() {
    document.getElementById('panel-success').style.display = 'none';
    document.getElementById('panel-main').style.display = 'block';
    document.getElementById('url-input').value = '';
    document.getElementById('file-name').value = 'qr';
    document.getElementById('qr-preview-box').style.display = 'none';
    document.getElementById('status-msg').className = 'status';
  }

  // ── Batch ─────────────────────────────────────────────
  function extractFolio(url) {
    try {
      const clean = url.trim();
      if (!clean) return null;
      // Toma el último segmento del path que sea solo dígitos
      const segments = new URL(clean).pathname.split('/').filter(Boolean);
      const last = segments[segments.length - 1];
      if (/^\d+$/.test(last)) return { url: clean, folio: last };
      // Si no es puro dígito, usa el segmento como nombre limpio
      if (last) return { url: clean, folio: last.replace(/[^a-zA-Z0-9_-]/g, '_') };
      return null;
    } catch(_) { return null; }
  }

  function parseBatch() {
    const raw = document.getElementById('batch-input').value;
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);

    if (lines.length === 0) {
      alert('Pega al menos una liga primero.');
      return;
    }

    batchItems = [];
    const list = document.getElementById('preview-list');
    list.innerHTML = '';

    const errors = [];
    lines.forEach((line, i) => {
      const parsed = extractFolio(line);
      if (!parsed) { errors.push(line); return; }
      batchItems.push({ ...parsed, status: 'pending', index: i });
    });

    if (batchItems.length === 0) {
      alert('No se encontraron ligas válidas.');
      return;
    }

    // Header
    list.innerHTML = `
      <div class="preview-list-header">
        <span>${batchItems.length} QR${batchItems.length !== 1 ? 's' : ''} detectados</span>
        <span>nombre → folio</span>
      </div>
    `;

    batchItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'preview-item';
      row.id = `item-${item.index}`;
      row.innerHTML = `
        <span class="folio">${item.folio}.png</span>
        <span class="purl">${item.url}</span>
        <span class="item-status pending" id="item-status-${item.index}">pendiente</span>
      `;
      list.appendChild(row);
    });

    if (errors.length > 0) {
      const errRow = document.createElement('div');
      errRow.style.cssText = 'font-size:11px;font-family:DM Mono,monospace;color:var(--danger);padding:8px 12px;';
      errRow.textContent = `${errors.length} línea(s) ignoradas (no son URLs válidas)`;
      list.appendChild(errRow);
    }

    document.getElementById('batch-preview').style.display = 'block';
    document.getElementById('btn-batch-run').style.display = 'block';
    document.getElementById('batch-status').className = 'status';
    resetProgress();
  }

  function resetProgress() {
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('progress-text').textContent = '0 / 0';
    document.getElementById('progress-pct').textContent = '0%';
  }

  function setItemStatus(index, type, label) {
    const el = document.getElementById(`item-status-${index}`);
    if (!el) return;
    el.className = `item-status ${type}`;
    el.textContent = label;
  }

  function setBatchStatus(type, msg) {
    const el = document.getElementById('batch-status');
    el.className = 'status ' + type;
    el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
  }

  function updateProgress(done, total) {
    const pct = Math.round((done / total) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${done} / ${total}`;
    document.getElementById('progress-pct').textContent = pct + '%';
  }

  async function runBatch() {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { alert('No hay token guardado.'); return; }
    if (batchItems.length === 0) { alert('Analiza las ligas primero.'); return; }

    batchRunning = true;
    batchCancelled = false;

    document.getElementById('btn-batch-run').style.display = 'none';
    document.getElementById('btn-batch-cancel').style.display = 'block';
    document.getElementById('progress-wrap').style.display = 'block';
    setBatchStatus('loading', `Procesando 0 de ${batchItems.length}...`);

    let done = 0, failed = 0;
    const total = batchItems.length;

    for (const item of batchItems) {
      if (batchCancelled) {
        setItemStatus(item.index, 'pending', 'cancelado');
        continue;
      }
      setItemStatus(item.index, 'running', '↑ subiendo...');
      try {
        await uploadQR(item.url, item.folio, token);
        setItemStatus(item.index, 'done', '✓ listo');
        done++;
      } catch(e) {
        setItemStatus(item.index, 'failed', '✗ error');
        failed++;
      }
      updateProgress(done + failed, total);
      setBatchStatus('loading', `Procesando ${done + failed} de ${total}...`);
      // Pausa breve para no saturar la API de GitHub
      await new Promise(r => setTimeout(r, 400));
    }

    batchRunning = false;
    document.getElementById('btn-batch-cancel').style.display = 'none';
    document.getElementById('btn-batch-run').style.display = 'block';

    if (batchCancelled) {
      setBatchStatus('error', `Cancelado. ${done} subidos, ${failed} errores.`);
    } else if (failed === 0) {
      setBatchStatus('success', `✓ ${done} QR${done !== 1 ? 's' : ''} subidos correctamente.\nPuedes verlos en la galería →`);
    } else {
      setBatchStatus('error', `Completado con errores: ${done} exitosos, ${failed} fallidos.`);
    }
  }

  function cancelBatch() {
    batchCancelled = true;
    document.getElementById('btn-batch-cancel').disabled = true;
    document.getElementById('btn-batch-cancel').textContent = 'Cancelando...';
  }

  init();
</script>
</body>
</html>
